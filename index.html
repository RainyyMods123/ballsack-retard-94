<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rainyys Modding</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .welcome-text {
            color: #ffffff;
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.3),
                0 0 20px rgba(255, 255, 255, 0.2),
                0 0 40px rgba(255, 255, 255, 0.1);
            animation: glow 3s ease-in-out infinite;
        }

        .welcome-text .highlight {
            color: #ff6b6b;
            text-shadow: 
                0 0 10px rgba(255, 107, 107, 0.5),
                0 0 20px rgba(255, 107, 107, 0.3),
                0 0 40px rgba(255, 107, 107, 0.2);
        }

        .sub-text {
            color: #888;
            font-size: 1.2rem;
            margin-top: 20px;
            letter-spacing: 6px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 
                    0 0 10px rgba(255, 255, 255, 0.3),
                    0 0 20px rgba(255, 255, 255, 0.2),
                    0 0 40px rgba(255, 255, 255, 0.1);
            }
            50% {
                text-shadow: 
                    0 0 20px rgba(255, 255, 255, 0.5),
                    0 0 40px rgba(255, 255, 255, 0.3),
                    0 0 80px rgba(255, 255, 255, 0.2);
            }
        }

        .loading-bar {
            margin-top: 40px;
            width: 400px;
            max-width: 80%;
            height: 3px;
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            display: inline-block;
        }

        .loading-bar .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff6b6b, #ffffff);
            border-radius: 10px;
            animation: loadBar 2s ease-in-out forwards;
        }

        @keyframes loadBar {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .cursor-blink {
            display: inline-block;
            width: 3px;
            height: 1em;
            background: #ff6b6b;
            margin-left: 5px;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @media (max-width: 768px) {
            .welcome-text {
                font-size: 2.2rem;
                letter-spacing: 2px;
            }
            .sub-text {
                font-size: 0.8rem;
                letter-spacing: 3px;
            }
            .loading-bar {
                width: 250px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="welcome-text">
        Welcome to <span class="highlight">Rainyys</span> Modding Website<span class="cursor-blink"></span>
    </div>
    <div class="sub-text">✦ Premium Mods & Resources ✦</div>
    <div class="loading-bar">
        <div class="fill"></div>
    </div>
</div>

</body>
</html>
